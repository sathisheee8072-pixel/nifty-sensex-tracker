<!DOCTYPE html>
<html>
<head>
    <title>Nifty Sensex Tracker</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #111;
            color: white;
        }
        .box {
            margin: 20px;
            padding: 20px;
            border: 1px solid #444;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <h1>📊 Market Tracker</h1>

    <div class="box">
        <h2>Nifty 50</h2>
        <p id="nifty">Loading...</p>
    </div>

    <div class="box">
        <h2>Sensex</h2>
        <p id="sensex">Loading...</p>
    </div>

    <!-- TradingView Widget -->
    <script src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js">
    {
        "symbol": "NSE:NIFTY",
        "width": "100%",
        "height": "220",
        "locale": "en",
        "dateRange": "1D",
        "colorTheme": "dark"
    }
    </script>

</body>
</html>
